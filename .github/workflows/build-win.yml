name: Build Windows binaries

on:
  # 仅保留手动触发
  workflow_dispatch:
    # 可选：如果不需要任何输入参数，可以直接写成 workflow_dispatch: {}
    inputs:
      build_type:
        description: '构建类型'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  msys:
    runs-on: windows-2022
    strategy:
      matrix:
        mingw: ["MINGW32", "MINGW64"]
        include:
          - mingw: "MINGW32"
            package: "mingw-w64-i686"
          - mingw: "MINGW64" 
            package: "mingw-w64-x86_64"
    defaults:
      run:
        shell: bash.exe --login -eo pipefail "{0}"
    env:
      MSYSTEM: ${{ matrix.mingw }}
      CHERE_INVOKING: 1
    name: MSYS2 ${{ matrix.mingw }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            base-devel
            ${{ matrix.package }}-toolchain
            make
      - name: Print system version
        run: |
          uname -a
          gcc --version
      - name: Build binaries
        run: |
          cd extractps3iso
          make
          cd ../makeps3iso
          make
          cd ../patchps3iso
          make
          cd ../splitps3iso
          make
          cd ..
      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
      - name: Compress output
        run: |
          tar -zcvf build.tar.gz extractps3iso/extractps3iso.exe makeps3iso/makeps3iso.exe patchps3iso/patchps3iso.exe splitps3iso/splitps3iso.exe
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.slug.outputs.sha8 }}-${{matrix.mingw}}
          path: build.tar.gz